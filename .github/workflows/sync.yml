name: Notion to Web Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Data from Notion
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{}' > data.json

      - name: Update HTML with Data
        run: |
          python3 -c "
          import json, re, sys
          try:
              # 1. 加载数据
              try:
                  with open('data.json', 'r', encoding='utf-8') as f:
                      data = json.load(f)
              except Exception as e:
                  raise Exception(f'读取 data.json 失败: {str(e)}')

              # 2. 提取卡片
              cards = ''
              results = data.get('results', [])
              if not results:
                  cards = '<p>Notion 中暂无数据，请检查数据库是否已分享给集成或是否有内容。</p>'
              
              for row in results:
                  props = row.get('properties', {})
                  
                  # 辅助函数：尝试匹配列名
                  def find_prop(name_keywords):
                      for k, v in props.items():
                          if any(kw in k for kw in name_keywords):
                              return v
                      return None

                  # 灵活抓取各个字段
                  p_title = find_prop(['标题', 'Name', 'title'])
                  p_cat = find_prop(['分类', 'Category', 'type'])
                  p_status = find_prop(['状态', 'Status'])
                  p_url = find_prop(['来源', 'Link', 'url'])
                  p_thought = find_prop(['感想', 'Thought', '备注'])

                  title = p_title['title'][0]['text']['content'] if p_title and p_title.get('title') else '无标题'
                  cat = p_cat['select']['name'] if p_cat and p_cat.get('select') else '未分类'
                  status = p_status['select']['name'] if p_status and p_status.get('select') else '待处理'
                  url = p_url['url'] if p_url and p_url.get('url') else '#'
                  thought = p_thought['rich_text'][0]['text']['content'] if p_thought and p_thought.get('rich_text') else '暂无感想'

                  cards += f'''
          <div class=\"card\">
              <span class=\"category\">{cat}</span>
              <div class=\"content\">
                  <span class=\"status\">{status}</span>
                  <h3>{title}</h3>
                  <div class=\"thought\">“{thought}”</div>
                  <a href=\"{url}\" target=\"_blank\" class=\"link-btn\">查看原帖</a>
              </div>
          </div>
          '''

              # 3. 写入 HTML
              with open('index.html', 'r', encoding='utf-8') as f:
                  html = f.read()
              
              # 稳健的占位符逻辑
              pattern = r'<div class=\"grid\" id=\"content\">.*?</div>'
              replacement = f'<div class=\"grid\" id=\"content\">\\n        {cards}\\n    </div>'
              
              if re.search(pattern, html, flags=re.DOTALL):
                  new_html = re.sub(pattern, replacement, html, flags=re.DOTALL)
              else:
                  # 如果找不到 grid，就强行插在 body 后面
                  new_html = html.replace('<body>', f'<body>\\n    {replacement}')

              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(new_html)

          except Exception as e:
              # 终极招数：如果报错，把报错写进网页，让你能看到原因
              error_msg = f'<div style=\"color:red;padding:20px;\">脚本运行出错: {str(e)}</div>'
              with open('index.html', 'a', encoding='utf-8') as f:
                  f.write(error_msg)
              print(f'Critical Error: {e}')
              sys.exit(1)
          "
