name: Notion to Web Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Data from Notion
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{}' > data.json

      - name: Update HTML with Data
        run: |
          python3 -c "
          import json, re
          try:
              with open('data.json') as f:
                  data = json.load(f)
              
              cards = ''
              for row in data.get('results', []):
                  props = row.get('properties', {})
                  
                  # 核心改进：全自动寻找列名，不再死磕具体的中文
                  def get_val(p_name, p_type):
                      # 找到包含该名称的列，不区分大小写
                      target = next((v for k, v in props.items() if p_name in k), None)
                      if not target: return None
                      if p_type == 'title': return target['title'][0]['text']['content'] if target['title'] else None
                      if p_type == 'select': return target['select']['name'] if target['select'] else None
                      if p_type == 'url': return target['url']
                      if p_type == 'text': return target['rich_text'][0]['text']['content'] if target['rich_text'] else None
                      return None

                  title = get_val('标题', 'title') or get_val('Name', 'title') or '无标题'
                  cat = get_val('分类', 'select') or '未分类'
                  status = get_val('状态', 'select') or '待办'
                  url = get_val('来源', 'url') or '#'
                  thought = get_val('感想', 'text') or '尚未写下感想...'
                  
                  cards += f'''
          <div class=\"card\">
              <span class=\"category\">{cat}</span>
              <div class=\"content\">
                  <span class=\"status\">状态：{status}</span>
                  <h3>{title}</h3>
                  <div class=\"thought\">“{thought}”</div>
                  <a href=\"{url}\" target=\"_blank\" class=\"link-btn\">查看原帖</a>
              </div>
          </div>
          '''
              
              with open('index.html', 'r', encoding='utf-8') as f:
                  html = f.read()
              
              # 更加稳健的占位符替换
              if '<!-- DATA_PLACEHOLDER -->' in html:
                  new_html = html.replace('<!-- DATA_PLACEHOLDER -->', cards)
              else:
                  new_grid = f'<div class=\"grid\" id=\"content\">\n        {cards}\n    </div>'
                  new_html = re.sub(r'<div class=\"grid\" id=\"content\">.*?</div>', new_grid, html, flags=re.DOTALL)
              
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(new_html)
          except Exception as e:
              print(f'Error: {e}')
              import traceback
              traceback.print_exc()
              exit(1)
          "
