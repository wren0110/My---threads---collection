name: Notion to Web Sync
on:
  schedule:
    - cron: '0 * * * *' # 每小时自动运行一次
  workflow_dispatch: # 允许你手动点击按钮运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Data from Notion
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{}' > data.json

      - name: Update HTML with Data
        run: |
          # 这是一个简化的脚本，将数据转为网页可见的格式
          python3 -c "
          - name: Update HTML with Data
        run: |
          python3 -c "
          import json
          with open('data.json') as f:
              data = json.load(f)
          
          cards = ''
          for row in data['results']:
              props = row['properties']
              # 这里的名称必须和你 Notion 的列名完全一致
              title = props['标题']['title'][0]['text']['content'] if props['标题']['title'] else '无标题'
              cat = props['分类']['select']['name'] if props['分类']['select'] else '未分类'
              status = props['状态']['select']['name'] if props['状态']['select'] else '未知'
              url = props['来源链接']['url'] if props['来源链接']['url'] else '#'
              thought = props['感想']['rich_text'][0]['text']['content'] if props['感想']['rich_text'] else '暂无感想'
              
              cards += f'''
              <div class=\"card\">
                  <span class=\"category\">{cat}</span>
                  <div class=\"content\">
                      <span class=\"status\">状态：{status}</span>
                      <h3>{title}</h3>
                      <div class=\"thought\">“{thought}”</div>
                      <a href=\"{url}\" target=\"_blank\" class=\"link-btn\">查看原帖</a>
                  </div>
              </div>
              '''
          
          # 读取模板并替换，实现覆盖更新而非追加
          with open('index.html', 'r') as f:
              html = f.read()
          
          # 核心修复：每次都找占位符替换
          import re
          new_content = f'<div class=\"grid\" id=\"content\">\n        {cards}\n    </div>'
          new_html = re.sub(r'<div class=\"grid\" id=\"content\">.*?</div>', new_content, html, flags=re.DOTALL)
          
          with open('index.html', 'w') as f:
              f.write(new_html)
          "
