name: Notion to Web Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Data from Notion
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{}' > data.json

      - name: Update HTML with Data
        run: |
         python3 -c "
          import json, sys
          try:
              with open('data.json', 'r', encoding='utf-8') as f:
                  data = json.load(f)
              
              # 关键动作：把抓到的第一条数据完整打印出来，让我们看清它的真面目
              if data.get('results'):
                  print('--- DATA SNAPSHOT START ---')
                  print(json.dumps(data['results'][0], indent=2, ensure_ascii=False))
                  print('--- DATA SNAPSHOT END ---')
              else:
                  print('CHECK: Notion returned an empty list. Results is empty.')
              
              # 后面暂时随便写点，确保不报错
              with open('index.html', 'a') as f:
                  f.write('<!-- Debug Mode -->')
          except Exception as e:
              print(f'Error: {e}')
              sys.exit(1)
          "
