name: Notion to Web Sync
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Fetch Data from Notion
        run: |
          curl -X POST "https://api.notion.com/v1/databases/${{ secrets.NOTION_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            --data '{}' > data.json

      - name: Update HTML with Data
        run: |
          python3 -c "
          import json, re
          try:
              with open('data.json') as f:
                  data = json.load(f)
              
              cards = ''
              for row in data.get('results', []):
                  props = row.get('properties', {})
                  
                  # 提取字段，增加容错处理
                  title = props['标题']['title'][0]['text']['content'] if props.get('标题') and props['标题']['title'] else '无标题'
                  cat = props['分类']['select']['name'] if props.get('分类') and props['分类']['select'] else '未分类'
                  status = props['状态']['select']['name'] if props.get('状态') and props['状态']['select'] else '待办'
                  url = props['来源链接']['url'] if props.get('来源链接') and props['来源链接']['url'] else '#'
                  
                  # 感想字段处理
                  thought_list = props.get('感想', {}).get('rich_text', [])
                  thought = thought_list[0]['text']['content'] if thought_list else '尚未写下感想...'
                  
                  cards += f'''
          <div class=\"card\">
              <span class=\"category\">{cat}</span>
              <div class=\"content\">
                  <span class=\"status\">状态：{status}</span>
                  <h3>{title}</h3>
                  <div class=\"thought\">“{thought}”</div>
                  <a href=\"{url}\" target=\"_blank\" class=\"link-btn\">查看原帖</a>
              </div>
          </div>
          '''
              
              with open('index.html', 'r', encoding='utf-8') as f:
                  html = f.read()
              
              # 正则替换：找到 grid 容器并替换其内部内容
              new_grid = f'<div class=\"grid\" id=\"content\">\\n        {cards}\\n    </div>'
              new_html = re.sub(r'<div class=\"grid\" id=\"content\">.*?</div>', new_grid, html, flags=re.DOTALL)
              
              with open('index.html', 'w', encoding='utf-8') as f:
                  f.write(new_html)
          except Exception as e:
              print(f'Error: {e}')
              exit(1)
          "

      - name: Commit and Push
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add index.html
          git commit -m "Update collection from Notion" || exit 0
          git push
